<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telex Test Pad - TypeMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #4ade80;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 20px 24px;
            border-radius: 16px;
            color: var(--text);
            font-size: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-box {
            background: rgba(15, 23, 42, 0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            word-break: break-all;
            min-height: 2.5rem;
        }

        #vietnamese-result {
            color: var(--success);
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .example-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: var(--accent);
            color: var(--bg);
            transform: translateY(-2px);
        }

        .status {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Telex Test Pad</h1>
        <p class="subtitle">Kiểm tra bộ gõ Tiếng Việt thời gian thực của TypeMaster</p>

        <div class="input-group">
            <input type="text" id="telex-input" placeholder="Gõ thử vào đây (vd: chuyeenj)..." autofocus
                autocomplete="off">
        </div>

        <div class="result-container">
            <div class="result-box">
                <div class="result-label">Raw Buffer</div>
                <div id="raw-buffer" class="result-value"></div>
            </div>
            <div class="result-box">
                <div class="result-label">Vietnamese Result</div>
                <div id="vietnamese-result" class="result-value"></div>
            </div>
        </div>

        <div class="result-label" style="margin-bottom: 12px;">Từ mẫu để test:</div>
        <div class="examples" id="example-list">
            <button class="example-btn">chuyeenj</button>
            <button class="example-btn">mias</button>
            <button class="example-btn">hoaf</button>
            <button class="example-btn">tieenf</button>
            <button class="example-btn">truwowngf</button>
            <button class="example-btn">tuaafn</button>
            <button class="example-btn">quar</button>
            <button class="example-btn">nghieeng</button>
        </div>

        <div class="status" id="status-text">
            <div class="dot"></div>
            Đang tải dữ liệu Telex...
        </div>
    </div>

    <script type="module">
        import { TelexEngine } from './src/utils/TelexEngine.js';

        const input = document.getElementById('telex-input');
        const rawDisplay = document.getElementById('raw-buffer');
        const vnDisplay = document.getElementById('vietnamese-result');
        const statusText = document.getElementById('status-text');
        const exampleList = document.getElementById('example-list');

        let engine;

        // Load rules from data.json
        async function init() {
            try {
                const response = await fetch('/rules.json');
                const data = await response.json();
                engine = new TelexEngine(data.telex_rules);
                statusText.innerHTML = '<div class="dot"></div> Đã sẵn sàng (Vite Mode)';
            } catch (err) {
                console.error(err);
                statusText.innerText = 'Lỗi khi tải data.json. Đang dùng bộ quy tắc mặc định...';
                // Fallback basic rules for local testing if fetch fails
            }
        }

        input.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (!engine) return;

            // Simple integration: clear engine and process the whole string
            engine.clear();
            let result = "";
            for (const char of val) {
                result = engine.processKey(char);
            }

            rawDisplay.innerText = val;
            vnDisplay.innerText = result;
        });

        // Example buttons
        exampleList.addEventListener('click', (e) => {
            if (e.target.classList.contains('example-btn')) {
                input.value = e.target.innerText;
                input.dispatchEvent(new Event('input'));
                input.focus();
            }
        });

        init();
    </script>
</body>

</html>
